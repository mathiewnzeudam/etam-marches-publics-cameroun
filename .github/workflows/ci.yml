name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-final
    env:
      # Valeurs factices — la suite de tests n'ouvre aucune connexion réelle
      # (voir tests/conftest.py) : ASGITransport ne déclenche pas le lifespan FastAPI.
      SECRET_KEY: ci-dummy-secret-key
      DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci
      GROQ_API_KEY: ci-dummy-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend-final/requirements.txt

      - name: Installer les dépendances
        run: |
          pip install --timeout 300 torch==2.2.2+cpu --extra-index-url https://download.pytorch.org/whl/cpu
          pip install --timeout 300 -r requirements.txt

      - name: Tests
        run: pytest tests/ -v

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Tests
        run: CI=true npx react-scripts test --watchAll=false

      - name: Build de production
        run: CI=true npx react-scripts build
